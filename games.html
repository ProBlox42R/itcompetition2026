/* ─── STARBURST LOADER ─── */
function starburstPath(cx, cy, r, points, ratio) {
  var d = "", total = points * 2;
  for (var k = 0; k < total; k++) {
    var angle = (Math.PI / points) * k - Math.PI / 2;
    var rad = (k % 2 === 0) ? r : r * ratio;
    var x = (cx + Math.cos(angle) * rad).toFixed(2);
    var y = (cy + Math.sin(angle) * rad).toFixed(2);
    d += (k === 0 ? "M" : "L") + x + " " + y + " ";
  }
  return d + "Z";
}

/* ─── HELPERS ─── */
function toRoman(n) {
  var m = [[1000,"M"],[900,"CM"],[500,"D"],[400,"CD"],[100,"C"],[90,"XC"],[50,"L"],[40,"XL"],[10,"X"],[9,"IX"],[5,"V"],[4,"IV"],[1,"I"]];
  var r = "";
  for (var i = 0; i < m.length; i++) { while (n >= m[i][0]) { r += m[i][1]; n -= m[i][0]; } }
  return r;
}
function shuffle(a) {
  for (var i = a.length-1; i > 0; i--) { var j = Math.floor(Math.random()*(i+1)); var t=a[i]; a[i]=a[j]; a[j]=t; }
  return a;
}

/* ─── GROQ CALL ─── */
function callAI(prompt, maxTokens) {
  maxTokens = maxTokens || 800;
  return fetch("https://api.groq.com/openai/v1/chat/completions", {
    method: "POST",
    headers: { "Content-Type": "application/json", "Authorization": "Bearer " + GROQ_KEY },
    body: JSON.stringify({
      model: "llama-3.1-8b-instant",
      max_tokens: maxTokens,
      temperature: 0.2,
      messages: [
        { role: "system", content: "You follow instructions exactly. Never output JSON for explanation tasks. Never invent facts outside the knowledge base." },
        { role: "user", content: prompt }
      ]
    })
  }).then(function(r) {
    if (!r.ok) throw new Error("API " + r.status);
    return r.json();
  }).then(function(d) {
    return d.choices[0].message.content;
  });
}

/* ─── EXTRACT JSON SAFELY ─── */
function extractJSON(raw) {
  var s = raw.replace(/```json/gi,"").replace(/```/gi,"").trim();
  var a = s.indexOf("["), b = s.lastIndexOf("]");
  if (a === -1 || b === -1) throw new Error("No JSON array");
  return s.slice(a, b+1);
}

/* ─── CLEAN EXPLANATION TEXT ─── */
function cleanExplanation(raw) {
  var text = raw.trim();

  /* if Llama returned JSON object, extract sentences from it */
  if (text.charAt(0) === "{" || text.charAt(0) === "[") {
    try {
      var obj = JSON.parse(text);
      var vals = [];
      function collectStrings(o) {
        if (typeof o === "string" && o.length > 5) vals.push(o);
        else if (Array.isArray(o)) { for (var i=0;i<o.length;i++) collectStrings(o[i]); }
        else if (typeof o === "object" && o !== null) { var ks=Object.keys(o); for (var i=0;i<ks.length;i++) collectStrings(o[ks[i]]); }
      }
      collectStrings(obj);
      text = vals.join(" ");
    } catch(e) {
      /* strip braces/brackets and JSON keys */
      text = text.replace(/[{}\[\]"]/g,"")
                 .replace(/\b(question|correct_answer|student_answer|was_correct|feedback|explanation|message|sentence_\d):/gi,"")
                 .trim();
    }
  }

  /* translate English words that slip through */
  var fixes = [
    ["Etruscans","Етруски"], ["etruscans","Етруски"],
    ["Romans","Римляните"], ["romans","Римляните"],
    ["Non-positional","непозиционна"], ["non-positional","непозиционна"],
    ["positional","позиционна"], ["Roman numerals","римски цифри"],
    ["correct","правилно"], ["incorrect","грешно"],
    ["zero","нула"], ["symbols","символи"], ["symbol","символ"]
  ];
  for (var fi=0; fi<fixes.length; fi++) {
    text = text.split(fixes[fi][0]).join(fixes[fi][1]);
  }

  return text.trim();
}

/* ─── GENERATE QUESTIONS ─── */
function generateWithAI(level) {
  var prompt =
    "Knowledge base:\n" + KNOWLEDGE +
    "\nTask: " + LEVEL_PROMPTS[level] +
    "\n\nRULES:\n" +
    "- Question text in simple correct Bulgarian\n" +
    "- Exactly 15 questions, no repeated topics\n" +
    "- Each: 1 correct answer + exactly 3 wrong plausible answers\n" +
    "- Output ONLY the JSON array. Start with [ end with ]. Nothing else.\n\n" +
    'Format: [{"q":"Bulgarian question","a":"correct answer","w":["wrong1","wrong2","wrong3"]},...]';

  return callAI(prompt, 2000).then(function(raw) {
    var parsed = JSON.parse(extractJSON(raw));
    var valid = [];
    for (var vi=0; vi<parsed.length; vi++) {
      var item = parsed[vi];
      if (item.q && item.a && Array.isArray(item.w) && item.w.length >= 3 && item.q.length < 200) {
        valid.push(item);
      }
    }
    if (valid.length < 10) throw new Error("Too few valid questions");
    return valid;
  });
}

/* ─── START TEST ─── */
function startTest(level) {

  if (!name) {
    if (player) name = player;
    else { alert("Моля въведи име"); return; }
  }
  localStorage.setItem("romanPlayer", name);
  currentLevel = level; index = 0;
  answers = []; questions = []; correct = []; choices = [];
  showLoader();

  var pct = 0;
  var prog = setInterval(function(){ pct = Math.min(pct+1.5, 88); setLoaderPct(pct); }, 80);
  var stats = ["Свързване с PrimeAI...","Анализиране на ниво "+level+"...","Генериране на въпроси...","Финализиране..."];
  var si = 0;
  setLoaderStatus(stats[0]);
  var statT = setInterval(function(){ si=(si+1)%stats.length; setLoaderStatus(stats[si]); }, 1400);

  generateWithAI(level).then(function(items) {
    clearInterval(prog); clearInterval(statT);
    setLoaderPct(100); setLoaderStatus("Готово ✓");
    return sleep(500).then(function(){
      for (var ii=0; ii<items.length; ii++) {
        questions.push(items[ii].q);
        correct.push(items[ii].a);
        choices.push(shuffle([items[ii].a, items[ii].w[0], items[ii].w[1], items[ii].w[2]]));
      }
      answers = new Array(questions.length).fill("");
      started = true;
      hideLoader();
      document.getElementById("startCard").style.display = "none";
      document.getElementById("testCard").style.display = "block";
      show();
    });
  }).catch(function(err) {
    clearInterval(prog); clearInterval(statT);
    console.error("PrimeAI:", err);
    setLoaderStatus("Резервен режим...");
    setLoaderPct(100);
    sleep(600).then(function(){
      fallback(level);
      answers = new Array(questions.length).fill("");
      started = true;
      hideLoader();
      document.getElementById("startCard").style.display = "none";
      document.getElementById("testCard").style.display = "block";
      show();
    });
  });
}

function fallback(level) {
  if (level === 1) {
    var bank = [
      {q:"Какъв тип бройна система са римските цифри?",a:"Непозиционна",w:["Позиционна","Двоична","Шестнадесетична"]},
      {q:"Коя буква означава 5?",a:"V",w:["I","X","L"]},

      {q:"Коя буква означава 50?",a:"L",w:["X","C","D"]},
      {q:"Коя буква означава 100?",a:"C",w:["L","D","M"]},
      {q:"Коя буква означава 500?",a:"D",w:["C","L","M"]},
      {q:"Коя буква означава 1000?",a:"M",w:["D","C","L"]},
      {q:"Как се записва 4 с римски цифри?",a:"IV",w:["IIII","VI","IIV"]},
      {q:"Как се записва 9 с римски цифри?",a:"IX",w:["VIIII","XI","IIX"]},
      {q:"Колко основни символа има системата?",a:"7",w:["5","9","10"]},
      {q:"Нулата съществува ли в римската система?",a:"Не",w:["Да — O","Да — Z","Да — N"]},
      {q:"Кой народ е създал римските цифри?",a:"Етруски",w:["Гърци","Египтяни","Перси"]},
      {q:"Как се записва 2024 с римски цифри?",a:"MMXXIV",w:["MMXXVI","MMXIV","MMXXIIII"]},
      {q:"Кое число е XIV?",a:"14",w:["16","11","40"]},
      {q:"Може ли V да се повтаря повече от веднъж?",a:"Не",w:["Да, до 2 пъти","Да, до 3 пъти","Да, без ограничение"]},
    ];
    shuffle(bank).slice(0,TOTAL).forEach(function(x){
      questions.push(x.q); correct.push(x.a); choices.push(shuffle([x.a,x.w[0],x.w[1],x.w[2]]));
    });
    return;
  }
  for (var fi=0; fi<TOTAL; fi++) {
    var n = Math.floor(Math.random()*198)+2, r = toRoman(n), ws=[];
    while (ws.length<3) { var d=Math.floor(Math.random()*10)+1, w=toRoman(n+(Math.random()<.5?d:-d)); if(w&&w!==r&&ws.indexOf(w)===-1) ws.push(w); }
    questions.push("Запиши "+n+" с римски цифри:"); correct.push(r); choices.push(shuffle([r,ws[0],ws[1],ws[2]]));
  }
}

  document.getElementById("progressFill").style.width = ((index+1)/questions.length*100)+"%";
  updateSkipped(); renderOptions();
}
function renderOptions() {
  var btns = document.querySelectorAll(".option"), opts = choices[index]||[];
  for (var oi=0; oi<btns.length; oi++) {
    (function(btn, opt){
      btn.innerText = opt||"—"; btn.className = "option";
      if (answers[index]===opt) btn.classList.add("selected");
      btn.onclick = function(){ selectAnswer(opt); };
    })(btns[oi], opts[oi]);
  }
}
function selectAnswer(v) {
  answers[index]=v;
  var btns=document.querySelectorAll(".option");
  for(var i=0;i<btns.length;i++) btns[i].classList.toggle("selected", btns[i].innerText===v);
  updateSkipped();
}
function next(){ if(index<questions.length-1){index++;show();}else{finish();} }
function prev(){ if(index>0){index--;show();} }
function updateSkipped(){
  var s=0; for(var i=0;i<answers.length;i++){if(answers[i]==="")s++;}
  document.getElementById("skipCounter").innerText="Пропуснати: "+s;
}

/* ─── GRADING ─── */
function grade(s){return s>=90?6:s>=75?5:s>=60?4:s>=40?3:2;}
function feedback(g){return["","","😅 Тренирай още!","🙂 Може по-добре!","👍 Добра работа!","🔥 Много добре!","🌟 Отлично! Ти си експерт!"][g];}
function getTier(v){return v<200?"🥉 Bronze":v<500?"🥈 Silver":v<1000?"🥇 Gold":v<2000?"💎 Diamond":"🏆 Legend";}

/* ─── FINISH ─── */
function finish() {
  started = false;
  var right=0, total=questions.length;
  for(var ri=0;ri<total;ri++){if((answers[ri]||"").toUpperCase()===(correct[ri]||"").toUpperCase())right++;}
  var pct=Math.round(right/total*100), g=grade(pct), gained=right*10;
  xp+=gained; highscore=Math.max(highscore,xp);
  localStorage.setItem("romanXP",xp); localStorage.setItem("romanHighscore",highscore);

  document.getElementById("testCard").style.display="none";
  var rc=document.getElementById("resultCard"); rc.style.display="block";
  document.getElementById("grade").innerText=g;
  document.getElementById("scoreMessage").innerText=feedback(g);
  document.getElementById("score").innerText="Правилни: "+right+" / "+total+" ("+pct+"%)";
  document.getElementById("xp").innerText="XP: "+xp+"  (+"+gained+")";
  document.getElementById("tier").innerText="Tier: "+getTier(xp);
  var tiers=[0,200,500,1000,2000,5000], nx=5000;
  for(var ti=0;ti<tiers.length;ti++){if(tiers[ti]>xp){nx=tiers[ti];break;}}
  var pv=tiers[tiers.indexOf(nx)-1]||0;
  document.getElementById("xpFill").style.width=Math.min((xp-pv)/(nx-pv)*100,100)+"%";

  /* buttons */
  var actEl=document.getElementById("resultActions");
  if(!actEl){
    actEl=document.createElement("div"); actEl.id="resultActions"; actEl.className="result-actions";
    actEl.innerHTML='<button class="btn-primary" onclick="tryAnother()">🔄 Опитай отново</button>'+
      '<button class="btn-secondary" onclick="shareLink()">📋 Копирай резултат</button>'+
      '<button class="btn-secondary" onclick="shareImage()">🖼 Изтегли снимка</button>';
    rc.appendChild(actEl);
  }

  /* review */
  var revEl=document.getElementById("reviewSection");
  if(!revEl){revEl=document.createElement("div");revEl.id="reviewSection";revEl.className="review-section";rc.appendChild(revEl);}
  revEl.innerHTML="<h2>📋 Преглед на въпросите</h2>";

  for(var qi=0;qi<total;qi++){
    var ua=answers[qi]||"", ic=ua.toUpperCase()===correct[qi].toUpperCase();
    var chips="", opts=choices[qi]||[correct[qi]];
    for(var ci=0;ci<opts.length;ci++){
      var o=opts[ci], isc=o.toUpperCase()===correct[qi].toUpperCase(), isu=o.toUpperCase()===ua.toUpperCase();
      var cl="review-chip";
      if(isu&&ic)cl+=" chip-selected-correct";
      else if(isu&&!ic)cl+=" chip-selected-wrong";
      else if(isc)cl+=" chip-correct";
      chips+='<span class="'+cl+'">'+o+'</span>';
    }
    var verd=ic?'<span class="verdict-correct">✓ Правилно!</span>':
      '<span class="verdict-wrong">✗ Грешно — верният отговор: <strong>'+correct[qi]+'</strong>'+(ua?' &nbsp;|&nbsp; Ти отговори: <strong>'+ua+'</strong>':' &nbsp;|&nbsp; Пропуснат')+'</span>';
    var card=document.createElement("div");
    card.className="review-item "+(ic?"correct-item":"wrong-item"); card.id="review-card-"+qi;
    card.innerHTML='<div class="q-number">Въпрос '+(qi+1)+'</div>'+
      '<div class="review-q">'+questions[qi]+'</div>'+
      '<div class="review-answers">'+chips+'</div>'+
      '<div class="review-verdict">'+verd+'</div>'+
      '<div class="review-explain" id="explain-'+qi+'">'+
        '<div class="explain-loading"><div class="explain-dot"></div><div class="explain-dot"></div><div class="explain-dot"></div><span>PrimeAI обяснява...</span></div>'+
      '</div>';
    revEl.appendChild(card);
  }

  /* chain explanations one by one */
  var chain=Promise.resolve();
  for(var ei=0;ei<total;ei++){
    (function(idx){
      chain=chain.then(function(){ return fetchExplanation(idx); });
    })(ei);
  }
}

/* ─── EXPLANATION ─── */
function fetchExplanation(i) {
  var ua=answers[i]||"не е отговорено", ic=ua.toUpperCase()===correct[i].toUpperCase();
  var el=document.getElementById("explain-"+i);
  if(!el) return Promise.resolve();

  var prompt =
    "Ти си приятелски учител по математика, който обяснява на ученик на 10 години.\n" +
    "Знания: " + KNOWLEDGE +
    "\nВъпрос: " + questions[i] +
    "\nПравилен отговор: " + correct[i] +
    "\nУченикът отговори: " + ua +
    "\n\nНапиши точно 2 изречения на български, обръщайки се към ученика с 'ти'.\n" +
    "Изречение 1: " + (ic ? "Започни с 'Браво!' и потвърди правилния отговор просто." : "Започни с 'Не точно!' и кажи кой е правилният отговор.") + "\n" +
    "Изречение 2: Обясни ЗАЩО с прости думи, разбираеми за дете.\n" +
    "ЗАБРАНИ: Не казвай 'ученикът', 'учащият', не използвай JSON, не използвай markdown.\n" +
    "Максимум 40 думи. Само обикновен текст.\n" +
    "Пример за добър отговор: 'Браво! V наистина означава 5 в римските цифри. Това е един от седемте основни символа, които трябва да запомниш!'";

  return callAI(prompt, 250).then(function(raw) {
    el.innerText = cleanExplanation(raw);
  }).catch(function() {
    el.innerText = ic
      ? "Браво! Верният отговор е " + correct[i] + "."
      : "Не точно! Верният отговор е " + correct[i] + ". Провери правилата за римски цифри.";
  });
}

/* ─── CLEAN EXPLANATION (handles JSON fallback) ─── */
function cleanExplanation(raw) {
  var text = raw.trim();
  if (text.charAt(0) === "{" || text.charAt(0) === "[") {
    try {
      var obj = JSON.parse(text), vals = [];
      function collect(o) {
        if (typeof o === "string" && o.length > 5) vals.push(o);
        else if (Array.isArray(o)) { for(var i=0;i<o.length;i++) collect(o[i]); }
        else if (o && typeof o==="object") { var ks=Object.keys(o); for(var i=0;i<ks.length;i++) collect(o[ks[i]]); }
      }
      collect(obj); text = vals.join(" ");
    } catch(e) {
      text = text.replace(/[{}\[\]"]/g,"").replace(/\b\w+_?\w*:/g,"").trim();
    }
  }
  var fixes=[["Etruscans","Етруски"],["etruscans","Етруски"],["Romans","Римляните"],
    ["Non-positional","непозиционна"],["Roman numerals","римски цифри"],["zero","нула"]];
  for(var fi=0;fi<fixes.length;fi++) text=text.split(fixes[fi][0]).join(fixes[fi][1]);
  return text.trim();
}

/* ─── TRY ANOTHER ─── */
function tryAnother() {
  document.getElementById("resultCard").style.display="none";
  var a=document.getElementById("resultActions"), r=document.getElementById("reviewSection");
  if(a)a.remove(); if(r)r.remove();
  document.getElementById("startCard").style.display="block";
}

/* ─── SHARE ─── */
function shareLink(){
  var g=document.getElementById("grade").innerText;
  navigator.clipboard.writeText("Получих оценка "+g+" на теста за римски цифри! 🏛");
  alert("Копирано!");
}
function shareImage(){
  html2canvas(document.getElementById("resultCard")).then(function(c){
    var a=document.createElement("a"); a.download="roman-score.png"; a.href=c.toDataURL(); a.click();
  });
}

window.onbeforeunload = function(){ if(started) return "Сигурен ли си?"; };
</script>
